services:
  backend:
    build: ./backend
    environment:
      HOST: 0.0.0.0
      PORT: 8080
    volumes:
      - session-data:/app/data
    expose:
      - "8080"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: vite-project/Dockerfile
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  session-data:
